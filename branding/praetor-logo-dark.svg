<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Praetor Logo</title>
  <desc id="desc">Praetor wordmark with geometric P monogram and the slogan Run your company with an AI CEO.</desc>
  <defs>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe9e1"/>
      <stop offset="55%" stop-color="#ddd5cc"/>
      <stop offset="100%" stop-color="#f6f2ec"/>
    </linearGradient>
    <style>
      .ink { fill: url(#ink); }
      .accent { fill: #c9a25d; }
      .wordmark {
        font-family: "Times New Roman", "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 74px;
        letter-spacing: 22px;
      }
      .tagline {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 18px;
        letter-spacing: 6px;
        font-weight: 600;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#050505"/>

  <g transform="translate(0 10)">
    <rect x="386" y="48" width="428" height="17" class="ink"/>
    <rect x="430" y="92" width="340" height="15" class="ink"/>

    <path class="ink" d="M487 138h272v16H608v180h96v-74h-58v-16h113v107H608v120h-56V154h-65z"/>
    <rect x="490" y="334" width="62" height="16" class="ink"/>
    <rect x="640" y="334" width="119" height="16" class="ink"/>
    <rect x="386" y="420" width="428" height="18" class="ink"/>
  </g>

  <text x="600" y="515" text-anchor="middle" class="ink wordmark">PRAETOR</text>

  <g transform="translate(0 0)">
    <rect x="210" y="557" width="68" height="2" class="accent"/>
    <rect x="922" y="557" width="68" height="2" class="accent"/>
    <text x="600" y="566" text-anchor="middle" class="accent tagline">RUN YOUR COMPANY WITH AN AI CEO</text>
  </g>
</svg>
