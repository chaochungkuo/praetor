name: Feature request
description: Suggest a product or engineering improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Praetor do?
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and privacy considerations
      description: Note any file, model-provider, executor, or secret-handling impact.
